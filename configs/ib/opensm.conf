#
# configs/ib/opensm.conf
# OpenSM Subnet Manager Configuration for DGX Cluster
# Place at: /etc/opensm/opensm.conf
#
# Reference: https://docs.nvidia.com/networking/display/UFMEnterpriseUMv6161
#

# -----------------------------------------------
# Routing
# -----------------------------------------------
# fat_tree: best for DGX fat-tree leaf-spine topology
# minhop: generic minimal hop (use for irregular topologies)
# updn: up-down for any tree (requires root GUIDs)
routing_engine fat_tree

# Set SM priority (higher = preferred master SM)
# Use 14 for primary SM, 0 for standby
sm_priority 14

# SM LID
sm_lid 1

# -----------------------------------------------
# Logging
# -----------------------------------------------
log_file /var/log/opensm.log
log_max_size 100

# Verbosity: 0=errors only, 1=info, 5=debug
log_level 1

# -----------------------------------------------
# Performance / Timeouts
# -----------------------------------------------
# Sweep interval in seconds (fabric rediscovery)
sweep_interval 10

# Max retries for SM operations
max_op_vls 4

# -----------------------------------------------
# IB Port MTU
# -----------------------------------------------
# 5 = 4096 bytes (recommended for DGX RDMA)
# 4 = 2048 bytes
# 3 = 1024 bytes
force_link_speed 0       # 0 = auto-negotiate
force_mtu 5              # 5 = 4096 bytes MTU

# -----------------------------------------------
# Subnet Prefix (unique per fabric)
# -----------------------------------------------
guid_routing_order_file /etc/opensm/guid_routing_order.cfg

# -----------------------------------------------
# SHARP (In-Network Compute)
# -----------------------------------------------
# Enable SHARP aggregation manager
enable_sharp_port_for_sharp 1
sharp_enabled 1

# -----------------------------------------------
# HA: Standby SM config
# -----------------------------------------------
# On standby SM, set sm_priority 0 and point to primary
# Primary SM will win election (priority 14 > 0)
#
# Standby node opensm.conf:
#   sm_priority 0
#   sweep_interval 10
