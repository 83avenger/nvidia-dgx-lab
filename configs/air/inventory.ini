# configs/air/inventory.ini
# Ansible inventory for NVIDIA AIR 8-node DGX lab
# Update IPs to match your AIR simulation assignments

[mgmt]
mgmt-server ansible_host=192.168.100.1

[dgx_nodes]
dgx-h100-01 ansible_host=192.168.100.11 gpu_model=H100 gpu_count=8
dgx-h100-02 ansible_host=192.168.100.12 gpu_model=H100 gpu_count=8
dgx-h100-03 ansible_host=192.168.100.13 gpu_model=H100 gpu_count=8
dgx-h100-04 ansible_host=192.168.100.14 gpu_model=H100 gpu_count=8
dgx-h100-05 ansible_host=192.168.100.15 gpu_model=H100 gpu_count=8
dgx-h100-06 ansible_host=192.168.100.16 gpu_model=H100 gpu_count=8
dgx-h100-07 ansible_host=192.168.100.17 gpu_model=H100 gpu_count=8
dgx-h100-08 ansible_host=192.168.100.18 gpu_model=H100 gpu_count=8

[ib_switches]
ib-leaf-1  ansible_host=192.168.100.20 switch_model=QM9700 tier=leaf
ib-leaf-2  ansible_host=192.168.100.21 switch_model=QM9700 tier=leaf
ib-leaf-3  ansible_host=192.168.100.22 switch_model=QM9700 tier=leaf
ib-spine-1 ansible_host=192.168.100.30 switch_model=QM9700 tier=spine

[ib_switches:vars]
ansible_user=cumulus
ansible_become=true

[cluster:children]
dgx_nodes
mgmt

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/air_lab_key
ansible_become=true
ansible_python_interpreter=/usr/bin/python3

# Override for your AIR environment:
# ansible_host_key_checking=False    # AIR VMs may have rotating keys
