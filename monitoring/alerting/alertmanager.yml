# monitoring/alerting/alertmanager.yml
# Alertmanager routing for DGX cluster alerts
# Deploy: kubectl create secret generic alertmanager-config \
#           --from-file=alertmanager.yml -n monitoring

global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK"
  smtp_smarthost: "smtp.internal:587"
  smtp_from: "dgx-alerts@company.ae"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "instance", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-dgx-ops

  routes:
    # Critical: XID errors, node down, SM failure
    - match:
        severity: critical
      receiver: slack-dgx-critical
      repeat_interval: 1h
      continue: true    # Also send to ops

    # Warning: temp, power, low util
    - match:
        severity: warning
      receiver: slack-dgx-ops
      repeat_interval: 4h

    # Info: utilization reports
    - match:
        severity: info
      receiver: slack-dgx-ops
      repeat_interval: 24h

receivers:
  - name: slack-dgx-ops
    slack_configs:
      - channel: "#dgx-cluster-ops"
        send_resolved: true
        title: >-
          {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }}
          DGX Alert: {{ .GroupLabels.alertname }}
        text: |
          {{ range .Alerts }}
          *Node*: {{ .Labels.instance }}
          *Severity*: {{ .Labels.severity }}
          *Description*: {{ .Annotations.description }}
          *Time*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: slack-dgx-critical
    slack_configs:
      - channel: "#dgx-critical"
        send_resolved: true
        title: "🚨 CRITICAL — DGX: {{ .GroupLabels.alertname }}"
        text: |
          *IMMEDIATE ACTION REQUIRED*
          {{ range .Alerts }}
          Node: {{ .Labels.instance }}
          Detail: {{ .Annotations.description }}
          {{ end }}
    email_configs:
      - to: "oncall@company.ae"
        subject: "CRITICAL DGX Alert: {{ .GroupLabels.alertname }}"
        body: |
          Alert: {{ .GroupLabels.alertname }}
          {{ range .Alerts }}
          Node: {{ .Labels.instance }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # If a node is down, suppress all other alerts from it
  - source_match:
      alertname: NodeDown
    target_match_re:
      alertname: "GPU.*|IB.*"
    equal: ["instance"]
